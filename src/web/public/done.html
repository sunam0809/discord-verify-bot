<!DOCTYPE html>
  <html lang="ko">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인증 완료</title>
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { font-family:'gg sans','Noto Sans KR',-apple-system,sans-serif; background:#1e1f22; color:#f2f3f5; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .container { background:#2b2d31; border-radius:16px; padding:48px 40px; max-width:420px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,0.5); border:1px solid #3f4147; text-align:center; animation:slideUp 0.3s ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .icon { font-size:64px; margin-bottom:20px; animation:pop 0.4s ease 0.2s both; }
    @keyframes pop { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
    h1 { font-size:24px; font-weight:700; margin-bottom:10px; color:#57F287; }
    p { color:#949ba4; font-size:14px; line-height:1.6; }
    .close-notice { margin-top:24px; font-size:12px; color:#4e5058; }
  </style>
  </head>
  <body>
  <div class="container">
    <div class="icon">✅</div>
    <h1>인증 완료!</h1>
    <p>성공적으로 인증되었습니다.<br>서버로 돌아가 역할을 확인해보세요.</p>
    <div class="close-notice">이 창을 닫아도 됩니다.</div>
  </div>
  </body>
  </html>
