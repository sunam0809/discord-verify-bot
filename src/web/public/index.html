  <title>Discord 인증 봇</title>
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { font-family:'gg sans','Noto Sans KR',-apple-system,sans-serif; background:#1e1f22; color:#f2f3f5; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .container { background:#2b2d31; border-radius:16px; padding:48px 40px; max-width:460px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,0.5); border:1px solid #3f4147; text-align:center; animation:slideUp 0.3s ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .logo { margin-bottom:24px; }
    .logo svg { width:64px; height:64px; }
    h1 { font-size:26px; font-weight:800; margin-bottom:10px; }
    .badge { display:inline-block; background:#5865F2; color:white; font-size:12px; font-weight:700; padding:3px 12px; border-radius:20px; margin-bottom:20px; letter-spacing:0.5px; }
    p { color:#949ba4; font-size:14px; line-height:1.7; margin-bottom:28px; }
    .status { display:flex; align-items:center; justify-content:center; gap:8px; background:#1e1f22; border:1px solid #3f4147; border-radius:10px; padding:12px 20px; font-size:14px; color:#57F287; font-weight:600; }
    .dot { width:8px; height:8px; background:#57F287; border-radius:50%; animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .footer { margin-top:24px; font-size:12px; color:#4e5058; }
  </style>
