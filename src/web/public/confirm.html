<!DOCTYPE html>
  <html lang="ko">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서버 인증</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'gg sans', 'Noto Sans KR', -apple-system, sans-serif;
      background: #1e1f22;
      color: #f2f3f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #2b2d31;
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border: 1px solid #3f4147;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-row svg { width: 36px; height: 36px; }
    .logo-row span {
      font-size: 20px;
      font-weight: 700;
      color: #f2f3f5;
    }
    .logo-row .badge {
      background: #5865F2;
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }
    .divider {
      height: 1px;
      background: #3f4147;
      margin-bottom: 28px;
    }
    .user-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #1e1f22;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 24px;
      border: 1px solid #3f4147;
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 3px solid #5865F2;
      flex-shrink: 0;
    }
    .user-info .name { font-size: 16px; font-weight: 700; color: #f2f3f5; }
    .user-info .id { font-size: 12px; color: #949ba4; margin-top: 2px; }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: #949ba4;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .info-grid {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }
    .info-row {
      background: #1e1f22;
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #3f4147;
    }
    .info-label { font-size: 12px; color: #949ba4; font-weight: 500; }
    .info-value { font-size: 13px; color: #f2f3f5; font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }
    .notice {
      background: rgba(88,101,242,0.1);
      border: 1px solid rgba(88,101,242,0.3);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      color: #949ba4;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .notice strong { color: #5865F2; }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.3px;
    }
    .btn-primary {
      background: #5865F2;
      color: white;
      margin-bottom: 10px;
    }
    .btn-primary:hover:not(:disabled) { background: #4752c4; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(88,101,242,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { text-align: center; font-size: 11px; color: #4e5058; margin-top: 16px; }
  </style>
  </head>
  <body>
  <div class="container">
    <div class="logo-row">
      <svg viewBox="0 0 127.14 96.36" fill="#5865F2" xmlns="http://www.w3.org/2000/svg">
        <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
      </svg>
      <span>서버 인증</span>
      <span class="badge">VERIFY</span>
    </div>
    <div class="divider"></div>

    <div class="user-card" id="userCard">
      <img class="avatar" id="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="avatar">
      <div class="user-info">
        <div class="name" id="username">로딩 중...</div>
        <div class="id" id="userId"></div>
      </div>
    </div>

    <div class="section-title">📋 수집되는 정보 (스팸 방지 목적)</div>
    <div class="info-grid" id="infoGrid">
      <div class="info-row"><span class="info-label">이메일</span><span class="info-value" id="email">-</span></div>
      <div class="info-row"><span class="info-label">접속 IP</span><span class="info-value" id="ip">-</span></div>
      <div class="info-row"><span class="info-label">ISP / 통신사</span><span class="info-value" id="isp">-</span></div>
      <div class="info-row"><span class="info-label">예상 통신사</span><span class="info-value" id="carrier">-</span></div>
      <div class="info-row"><span class="info-label">예상 지역</span><span class="info-value" id="location">-</span></div>
      <div class="info-row"><span class="info-label">기기 유형</span><span class="info-value" id="device">-</span></div>
    </div>

    <div class="notice">
      위 정보는 <strong>스팸 계정 방지</strong>를 위해 서버 관리자에게만 공유됩니다.<br>
      인증을 완료하면 서버 역할이 자동으로 부여됩니다.
    </div>

    <button class="btn btn-primary" id="verifyBtn" onclick="completeVerify()">🛡️ 인증 완료하기</button>
    <div class="footer">Discord 공식 OAuth2를 통해 안전하게 인증됩니다.</div>
  </div>

  <script>
  async function loadData() {
    const res = await fetch('/api/verify-data');
    if (!res.ok) { window.location.href = '/verify/error?msg=' + encodeURIComponent('세션이 만료되었습니다.'); return; }
    const d = await res.json();
    const avatarUrl = d.avatar
      ? 'https://cdn.discordapp.com/avatars/' + d.userId + '/' + d.avatar + '.png?size=128'
      : 'https://cdn.discordapp.com/embed/avatars/0.png';
    document.getElementById('avatar').src = avatarUrl;
    document.getElementById('username').textContent = d.username;
    document.getElementById('userId').textContent = 'ID: ' + d.userId;
    document.getElementById('email').textContent = d.email;
    document.getElementById('ip').textContent = d.ip;
    document.getElementById('isp').textContent = d.isp;
    document.getElementById('carrier').textContent = d.carrier;
    document.getElementById('location').textContent = d.country + ' / ' + d.region + ' / ' + d.city;
    document.getElementById('device').textContent = d.mobile ? '📱 모바일' : '🖥️ 데스크탑';
  }

  async function completeVerify() {
    const btn = document.getElementById('verifyBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>인증 처리 중...';
    try {
      const res = await fetch('/api/verify-complete', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/verify/done';
      } else {
        alert('오류: ' + (data.error || '알 수 없는 오류'));
        btn.disabled = false;
        btn.textContent = '🛡️ 인증 완료하기';
      }
    } catch(e) {
      alert('네트워크 오류가 발생했습니다.');
      btn.disabled = false;
      btn.textContent = '🛡️ 인증 완료하기';
    }
  }

  loadData();
  </script>
  </body>
  </html>
