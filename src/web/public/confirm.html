<!DOCTYPE html>
  <html lang="ko">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서버 인증</title>
  <style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'gg sans','Noto Sans KR',-apple-system,sans-serif;background:#1e1f22;color:#f2f3f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#2b2d31;border-radius:16px;padding:40px 36px;max-width:420px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.5);border:1px solid #3f4147;animation:up .3s ease}
  @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .logo-row{display:flex;align-items:center;gap:10px;margin-bottom:28px}
  .logo-row svg{width:30px;height:30px;flex-shrink:0}
  .logo-row .title{font-size:17px;font-weight:700;color:#f2f3f5}
  .pill{margin-left:auto;background:#5865F2;color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;letter-spacing:.5px}
  .divider{height:1px;background:#3f4147;margin-bottom:28px}
  .user-row{display:flex;align-items:center;gap:14px;background:#1e1f22;border:1px solid #3f4147;border-radius:12px;padding:14px 16px;margin-bottom:20px}
  .avatar{width:54px;height:54px;border-radius:50%;border:3px solid #5865F2;flex-shrink:0}
  .user-name{font-size:17px;font-weight:700;color:#f2f3f5}
  .user-tag{font-size:12px;color:#949ba4;margin-top:3px}
  .server-box{background:#1e1f22;border:1px solid #3f4147;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#949ba4;display:flex;align-items:center;gap:8px}
  .server-box span{color:#f2f3f5;font-weight:600}
  .notice{background:rgba(88,101,242,.08);border:1px solid rgba(88,101,242,.25);border-radius:10px;padding:13px 15px;font-size:12px;color:#949ba4;line-height:1.7;margin-bottom:24px}
  .notice strong{color:#c9cdfb}
  .btn{width:100%;padding:14px;border-radius:8px;border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;background:#5865F2;color:#fff}
  .btn:hover:not(:disabled){background:#4752c4;transform:translateY(-1px);box-shadow:0 4px 14px rgba(88,101,242,.4)}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .footer{text-align:center;font-size:11px;color:#4e5058;margin-top:18px}
  </style>
  </head>
  <body>
  <div class="card">
    <div class="logo-row">
      <svg viewBox="0 0 127.14 96.36" fill="#5865F2" xmlns="http://www.w3.org/2000/svg"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/></svg>
      <span class="title" id="panelTitle">서버 인증</span>
      <span class="pill">VERIFY</span>
    </div>
    <div class="divider"></div>
    <div class="user-row">
      <img class="avatar" id="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="">
      <div>
        <div class="user-name" id="globalName">로딩 중...</div>
        <div class="user-tag" id="username"></div>
      </div>
    </div>
    <div class="server-box">
      🔐 인증 후 <span id="serverTitle">서버</span>의 역할이 자동으로 부여됩니다.
    </div>
    <div class="notice">
      인증을 완료하면 <strong>서버 관리자에게 접속 정보가 기록</strong>됩니다.<br>
      이 정보는 스팸 계정 방지 목적으로만 사용됩니다.
    </div>
    <button class="btn" id="btn" onclick="verify()">🛡️ 인증 완료하기</button>
    <div class="footer">Discord 공식 OAuth2 인증 · 안전한 연결</div>
  </div>
  <script>
  async function load() {
    const res = await fetch('/api/verify-data');
    if (!res.ok) { location.href = '/verify/error?msg=' + encodeURIComponent('세션 만료. 다시 시도해주세요.'); return; }
    const d = await res.json();
    document.getElementById('avatar').src = d.avatar
      ? 'https://cdn.discordapp.com/avatars/' + d.userId + '/' + d.avatar + '.png?size=128'
      : 'https://cdn.discordapp.com/embed/avatars/0.png';
    document.getElementById('globalName').textContent = d.globalName || d.username;
    document.getElementById('username').textContent = '@' + d.username + ' · ID: ' + d.userId;
    document.getElementById('panelTitle').textContent = d.panelTitle || '서버 인증';
    document.getElementById('serverTitle').textContent = d.panelTitle || '서버';
  }
  async function verify() {
    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>처리 중...';
    try {
      const res = await fetch('/api/verify-complete', { method: 'POST', headers: {'Content-Type':'application/json'} });
      const data = await res.json();
      if (data.success) location.href = '/verify/done';
      else { alert('오류: ' + (data.error || '알 수 없는 오류')); btn.disabled=false; btn.textContent='🛡️ 인증 완료하기'; }
    } catch(e) { alert('네트워크 오류'); btn.disabled=false; btn.textContent='🛡️ 인증 완료하기'; }
  }
  load();
  </script>
  </body>
  </html>
